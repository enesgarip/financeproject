name: Dependabot auto-merge

# Auto-merges Dependabot PRs for patch & minor updates once CI passes.
# Major updates are left open for manual review (they may contain breaking
# changes). Merging waits for the required "Lint and Build" check via GitHub's
# native auto-merge, and the branch is deleted automatically afterwards.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch & minor updates
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
