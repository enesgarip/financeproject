name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# contents: read for checkout; actions: write so the pre-migration backup
# (reusable db-backup workflow) can prune old artifacts.
permissions:
  contents: read
  actions: write

jobs:
  # Take an encrypted backup before any migration runs, so a bad migration
  # always has an exact pre-migration restore point. Migration waits on this.
  backup:
    name: Pre-migration backup
    uses: ./.github/workflows/db-backup.yml
    secrets: inherit

  migrate:
    name: Supabase Production Migration
    needs: backup
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Supabase CLI (with retry)
        run: |
          VERSION=2.101.0
          ok=0
          for i in 1 2 3 4 5; do
            if curl -fSL "https://github.com/supabase/cli/releases/download/v${VERSION}/supabase_linux_amd64.tar.gz" -o supabase.tar.gz; then
              ok=1; break
            fi
            echo "Supabase CLI download attempt $i failed; retrying in 15s..."
            sleep 15
          done
          [ "$ok" = 1 ] || { echo "::error::Supabase CLI download failed after 5 attempts"; exit 1; }
          rm -rf /tmp/sbcli && mkdir -p /tmp/sbcli
          tar -xzf supabase.tar.gz -C /tmp/sbcli
          # Recent releases ship a `supabase` shim plus a `supabase-go` binary;
          # install both, co-located, so the shim can find its backend.
          sudo cp /tmp/sbcli/supabase* /usr/local/bin/
          sudo chmod +x /usr/local/bin/supabase*
          supabase --version

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Show migration plan
        run: supabase db push --linked --dry-run --include-all

      - name: Apply production migrations
        run: supabase db push --linked --include-all

      - name: Deploy edge functions
        run: |
          supabase functions deploy bist-quote --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy parse-receipt --project-ref "$SUPABASE_PROJECT_REF"

  deploy:
    name: Trigger Vercel Deploy Hook
    runs-on: ubuntu-latest
    needs:
      - migrate
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Trigger production deploy
        run: node ./scripts/trigger-vercel-deploy.mjs
