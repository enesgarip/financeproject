name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# contents: read for checkout; actions: write so the pre-migration backup
# (reusable db-backup workflow) can prune old artifacts.
permissions:
  contents: read
  actions: write

jobs:
  # Detect whether this push touched any migration file. The pre-migration
  # backup only runs when it did, so UI/edge-only deploys don't take (and crowd
  # out) backups. The daily scheduled backup still covers everything else.
  changes:
    name: Detect migration changes
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.detect.outputs.migrations }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect migration changes
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "migrations=true" >> "$GITHUB_OUTPUT" # manual/first run: back up to be safe
            exit 0
          fi
          changed=$(git diff --name-only "$BEFORE" "$SHA" -- supabase/migrations 2>/dev/null || echo ERROR)
          if [ "$changed" = "ERROR" ] || [ -n "$changed" ]; then
            echo "migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations=false" >> "$GITHUB_OUTPUT"
          fi

  # Encrypted backup before migrations run (only when a migration actually
  # changed), so a bad migration always has a pre-migration restore point.
  backup:
    name: Pre-migration backup
    needs: changes
    if: ${{ needs.changes.outputs.migrations == 'true' }}
    uses: ./.github/workflows/db-backup.yml
    secrets: inherit

  migrate:
    name: Supabase Production Migration
    needs: [changes, backup]
    # Proceed unless a required backup failed; a skipped backup (no migration
    # change) is fine.
    if: ${{ !cancelled() && needs.backup.result != 'failure' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI (with retry)
        run: |
          VERSION=2.101.0
          ok=0
          for i in 1 2 3 4 5; do
            if curl -fSL "https://github.com/supabase/cli/releases/download/v${VERSION}/supabase_linux_amd64.tar.gz" -o supabase.tar.gz; then
              ok=1; break
            fi
            echo "Supabase CLI download attempt $i failed; retrying in 15s..."
            sleep 15
          done
          [ "$ok" = 1 ] || { echo "::error::Supabase CLI download failed after 5 attempts"; exit 1; }
          rm -rf /tmp/sbcli && mkdir -p /tmp/sbcli
          tar -xzf supabase.tar.gz -C /tmp/sbcli
          # Recent releases ship a `supabase` shim plus a `supabase-go` binary;
          # install both, co-located, so the shim can find its backend.
          sudo cp /tmp/sbcli/supabase* /usr/local/bin/
          sudo chmod +x /usr/local/bin/supabase*
          supabase --version

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Show migration plan
        run: supabase db push --linked --dry-run --include-all

      - name: Apply production migrations
        run: supabase db push --linked --include-all

      - name: Deploy edge functions
        run: |
          supabase functions deploy bist-quote --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy parse-receipt --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy parse-statement --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy push-notify --project-ref "$SUPABASE_PROJECT_REF"

  deploy:
    name: Trigger Vercel Deploy Hook
    runs-on: ubuntu-latest
    needs:
      - migrate
    # Explicit condition: a skipped backup upstream must not skip the frontend
    # deploy. Run whenever migration succeeded.
    if: ${{ !cancelled() && needs.migrate.result == 'success' }}
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Trigger production deploy
        run: node ./scripts/trigger-vercel-deploy.mjs
