name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Supabase Production Migration
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --no-prompt

      - name: Show migration plan
        run: supabase db push --linked --dry-run --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Apply production migrations
        run: supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy edge functions
        run: |
          supabase functions deploy bist-quote --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy parse-receipt --project-ref "$SUPABASE_PROJECT_REF"

  deploy:
    name: Trigger Vercel Deploy Hook
    runs-on: ubuntu-latest
    needs:
      - migrate
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Trigger production deploy
        run: node ./scripts/trigger-vercel-deploy.mjs
