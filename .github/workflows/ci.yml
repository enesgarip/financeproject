name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'codex/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-anon-key

      - name: Bundle size budget
        run: npm run check:bundle

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Use Playwright Chromium for Lighthouse
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('playwright'); console.log(chromium.executablePath())")"
          test -x "$CHROME_PATH"
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          echo "Using Chromium at $CHROME_PATH"

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-anon-key

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-report
          path: .lighthouseci
          if-no-files-found: ignore

  e2e:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          CI: "1"
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-anon-key

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  supabase:
    name: Supabase Migration Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Supabase CLI (with retry)
        run: |
          VERSION=2.101.0
          ok=0
          for i in 1 2 3 4 5; do
            if curl -fSL "https://github.com/supabase/cli/releases/download/v${VERSION}/supabase_linux_amd64.tar.gz" -o supabase.tar.gz; then
              ok=1; break
            fi
            echo "Supabase CLI download attempt $i failed; retrying in 15s..."
            sleep 15
          done
          [ "$ok" = 1 ] || { echo "::error::Supabase CLI download failed after 5 attempts"; exit 1; }
          rm -rf /tmp/sbcli && mkdir -p /tmp/sbcli
          tar -xzf supabase.tar.gz -C /tmp/sbcli
          # Recent releases ship a `supabase` shim plus a `supabase-go` binary;
          # install both, co-located, so the shim can find its backend.
          sudo cp /tmp/sbcli/supabase* /usr/local/bin/
          sudo chmod +x /usr/local/bin/supabase*
          supabase --version

      - name: Start local Supabase
        run: supabase db start

      - name: Reapply migrations locally
        run: supabase db reset --local --no-seed

      - name: Lint local database
        run: supabase db lint --local --fail-on error

      - name: RLS policy audit
        run: docker exec -i supabase_db_financeproject psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f - < supabase/tests/rls_audit.sql
